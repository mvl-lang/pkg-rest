[package]
name         = "rest"
version      = "0.4.2"
license      = "Apache-2.0"
requires-mvl = ">=0.205.0"

[dependencies]
"github.com/mvl-lang/pkg-http" = { git = "https://github.com/mvl-lang/pkg-http", tag = "v0.5.0", rationale = "Raw HTTP types — pkg-rest layers typed JSON on top" }
"github.com/mvl-lang/pkg-tls" = { git = "https://github.com/mvl-lang/pkg-tls", tag = "v0.2.1", rationale = "HTTPS transport for REST client" }
